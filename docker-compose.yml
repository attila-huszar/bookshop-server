services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: server
    profiles: ['sqlite']
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: SQLITE
    command: >
      sh -c "
       set -e
       if [ -n \"$SETUP\" ]; then
         bun migrate && bun seed
       fi
      if [ \"$NODE_ENV\" = \"production\" ]; then
         bun src/app.ts
       else
         bun dev --watch
       fi
       "
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=server'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./src:/bookshop-server/src
      - sqlite_data:/bookshop-server/data

  server-with-mongo:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: server-with-mongo
    profiles: ['mongo']
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      mongodb:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: MONGO
    command: >
      sh -c "
       set -e
       if [ -n \"$SETUP\" ]; then
         bun seed
       fi
      if [ \"$NODE_ENV\" = \"production\" ]; then
         bun src/app.ts
       else
         bun dev --watch
       fi
       "
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=server-with-mongo'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:5000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ./src:/bookshop-server/src

  mongodb:
    image: mongo
    container_name: mongodb
    profiles: ['mongo']
    ports:
      - '27017:27017'
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=mongodb'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--eval',
          "db.adminCommand('ping').ok",
          'mongodb://127.0.0.1:27017/admin',
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: worker
    profiles: ['sqlite']
    depends_on:
      redis:
        condition: service_started
      server:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: SQLITE
    command: bun worker:email
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=worker'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    volumes:
      - ./src:/bookshop-server/src
      - sqlite_data:/bookshop-server/data

  worker-with-mongo:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: worker-with-mongo
    profiles: ['mongo']
    depends_on:
      redis:
        condition: service_started
      server-with-mongo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: MONGO
    command: bun worker:email
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=worker-with-mongo'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    volumes:
      - ./src:/bookshop-server/src

  cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: cron
    container_name: cron
    profiles: ['sqlite']
    depends_on:
      server:
        condition: service_healthy
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: SQLITE
      CRON_FILE: /bookshop-server/docker/cron/sqlite.crontab
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=cron'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    volumes:
      - ./src:/bookshop-server/src
      - ./docker/cron:/bookshop-server/docker/cron
      - sqlite_data:/bookshop-server/data
      - backups_data:/bookshop-server/data/backups

  cron-with-mongo:
    build:
      context: .
      dockerfile: Dockerfile
      target: cron
    container_name: cron-with-mongo
    profiles: ['mongo']
    depends_on:
      server-with-mongo:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      loki:
        condition: service_started
    restart: unless-stopped
    env_file: .env
    environment:
      DB_REPO: MONGO
      CRON_FILE: /bookshop-server/docker/cron/mongo.crontab
    logging:
      driver: loki
      options:
        loki-url: 'http://127.0.0.1:3100/loki/api/v1/push'
        loki-external-labels: 'job=cron-with-mongo'
        loki-pipeline-stages: |
          - json:
              expressions:
                level: level
          - labels:
              level:
    volumes:
      - ./src:/bookshop-server/src
      - ./docker/cron:/bookshop-server/docker/cron
      - backups_data:/bookshop-server/data/backups

  loki:
    image: grafana/loki
    container_name: loki
    ports:
      - '3100:3100'
    volumes:
      - loki-data:/loki
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: '%(protocol)s://%(domain)s/grafana'
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  sqlite_data:
  mongodb_data:
  backups_data:
  loki-data:
  grafana-data:
